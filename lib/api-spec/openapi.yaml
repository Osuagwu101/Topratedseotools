openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Subscription products
  - name: orders
    description: Orders
  - name: payments
    description: Paystack payment operations
  - name: users
    description: User account operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all subscription products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a single product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found

  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Validation error

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  /users/me/orders:
    get:
      operationId: getMyOrders
      tags: [users]
      summary: Get the current authenticated user's orders
      responses:
        "200":
          description: List of user orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserOrder"
        "401":
          description: Unauthorized

  /site-settings:
    get:
      operationId: getSiteSettings
      tags: [products]
      summary: Get public site branding settings
      responses:
        "200":
          description: Current site settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

  /paystack/initialize:
    post:
      operationId: initializePayment
      tags: [payments]
      summary: Initialize a Paystack payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInit"
      responses:
        "200":
          description: Paystack checkout URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentInitResponse"
        "400":
          description: Validation error

  /paystack/webhook:
    post:
      operationId: paystackWebhook
      tags: [payments]
      summary: Paystack webhook — activates orders/entitlements on successful payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaystackWebhookPayload"
      responses:
        "200":
          description: Webhook processed
        "400":
          description: Invalid signature or payload

  /paystack/verify/{reference}:
    get:
      operationId: verifyPayment
      tags: [payments]
      summary: Verify a Paystack payment
      parameters:
        - name: reference
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentVerification"
        "400":
          description: Verification failed

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Product:
      type: object
      required: [id, name, description, priceKobo, billingPeriod, category]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        fullDescription:
          type: ["string", "null"]
          description: Optional longer-form description shown on the product detail page. Falls back to `description` when null.
        imageUrl:
          type: ["string", "null"]
          description: URL of the tool's uploaded logo/image, served via the storage proxy. Null if no custom image has been uploaded.
        priceKobo:
          type: integer
          description: 1-month price in kobo (1 NGN = 100 kobo)
        price3MonthKobo:
          type: ["integer", "null"]
          description: 3-month price in kobo, if configured
        price12MonthKobo:
          type: ["integer", "null"]
          description: 12-month price in kobo, if configured
        billingPeriod:
          type: string
          description: "monthly or per_check"
        category:
          type: string
        features:
          type: array
          items:
            type: string
        popular:
          type: boolean
        isHidden:
          type: boolean
          description: Hidden tools are excluded from the public storefront and cannot be purchased.
        oneClickAuthEnabled:
          type: boolean
          description: When true, subscribers see a One-Click Auth button that logs them into the tool through the masking proxy using the admin's master session.
        maxDailyInputs:
          type: ["integer", "null"]
          description: Optional cap on tasks/inputs a subscriber can perform per day (WAT calendar day) while using One-Click Auth. Null or 0 means unlimited.
        crossSellProductIds:
          type: array
          items:
            type: integer
          description: Ids of complementary products to recommend alongside this one ("You may also like").
        upSellProductIds:
          type: array
          items:
            type: integer
          description: Ids of higher-tier/premium alternative products to recommend instead of this one.
        downSellProductIds:
          type: array
          items:
            type: integer
          description: Ids of cheaper alternative products to recommend instead of this one.
        featuredOrder:
          type: ["integer", "null"]
          description: Homepage "Popular Tools" display order. Null means the tool is not featured on the homepage.
        homepageBlurb:
          type: ["string", "null"]
          description: Optional short blurb shown only on the homepage's Popular Tools card. Falls back to `description` when null.

    OrderInput:
      type: object
      required: [productId, customerEmail, customerName]
      properties:
        productId:
          type: integer
        customerEmail:
          type: string
        customerName:
          type: string
        durationMonths:
          type: integer
          description: "1, 3, or 12 — defaults to 1"

    Order:
      type: object
      required: [id, productId, customerEmail, customerName, amountKobo, status, reference, createdAt, durationMonths]
      properties:
        id:
          type: integer
        productId:
          type: integer
        customerEmail:
          type: string
        customerName:
          type: string
        amountKobo:
          type: integer
        status:
          type: string
        reference:
          type: string
        createdAt:
          type: string
        durationMonths:
          type: integer

    PaymentInit:
      type: object
      required: [orderId, email, amountKobo]
      properties:
        orderId:
          type: integer
        email:
          type: string
        amountKobo:
          type: integer

    PaymentInitResponse:
      type: object
      required: [authorizationUrl, reference]
      properties:
        authorizationUrl:
          type: string
        reference:
          type: string

    UserOrder:
      type: object
      required: [id, productId, productName, amountKobo, status, reference, createdAt, billingPeriod, durationMonths]
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        amountKobo:
          type: integer
        status:
          type: string
        reference:
          type: string
        createdAt:
          type: string
        billingPeriod:
          type: string
        durationMonths:
          type: integer
        expiresAt:
          type: ["string", "null"]
        credUsername:
          type: string
          nullable: true
        credPassword:
          type: string
          nullable: true
        isAutoLogin:
          type: boolean
          nullable: true
        oneClickAuthEnabled:
          type: boolean
          description: Whether the admin has enabled One-Click Auth for this tool. The one-click login button should only be shown when this is true.
        maxDailyInputs:
          type: ["integer", "null"]
          description: Optional daily task cap (WAT calendar day) for this tool while One-Click Auth is on. Null or 0 means unlimited.
        dailyUsageCount:
          type: ["integer", "null"]
          description: Tasks already used today (WAT calendar day) against maxDailyInputs. Null when the tool has no cap or isn't active.

    PaystackWebhookPayload:
      type: object
      required: [event]
      properties:
        event:
          type: string
        data:
          type: object
          properties:
            reference:
              type: string
            amount:
              type: integer
            status:
              type: string

    SiteSettings:
      type: object
      required: [id, siteHeadline, siteSubheadline, paymentFooterText, copyrightText, copyrightYear, useDynamicCopyrightYear]
      properties:
        id:
          type: integer
        siteLogoUrl:
          type: ["string", "null"]
        siteHeadline:
          type: string
        siteSubheadline:
          type: string
        paymentFooterText:
          type: string
        copyrightText:
          type: string
        copyrightYear:
          type: string
        useDynamicCopyrightYear:
          type: boolean
        updatedAt:
          type: ["string", "null"]
        updatedBy:
          type: ["string", "null"]

    PaymentVerification:
      type: object
      required: [status, reference, amount]
      properties:
        status:
          type: string
        reference:
          type: string
        amount:
          type: integer
        orderId:
          type: ["integer", "null"]
        productName:
          type: ["string", "null"]
